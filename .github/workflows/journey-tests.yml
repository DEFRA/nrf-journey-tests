name: Run Journey Tests on GitHub

permissions:
  checks: write
  pull-requests: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      nrf-frontend:
        description: 'Docker image tag for nrf-frontend. Defaults to latest.'
        required: false
        type: string
      nrf-backend:
        description: 'Docker image tag for nrf-backend. Defaults to latest.'
        required: false
        type: string
      browser:
        description: 'Browser engine to use (chromium, firefox, webkit). Defaults to chromium.'
        required: false
        type: string
        default: chromium
  workflow_call:
    inputs:
      nrf-frontend:
        required: false
        type: string
      nrf-backend:
        required: false
        type: string
      browser:
        required: false
        type: string
        default: chromium

jobs:
  build:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DEFRA/nrf-journey-tests
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || '' }}

      - uses: ./run-journey-tests
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || '' }}
          nrf-frontend: ${{ inputs.nrf-frontend }}
          nrf-backend: ${{ inputs.nrf-backend }}
          browser: ${{ inputs.browser }}
