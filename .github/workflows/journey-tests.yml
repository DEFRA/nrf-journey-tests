name: Run Journey Tests on GitHub

permissions:
  checks: write
  pull-requests: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      nrf-frontend:
        description: 'Docker image tag for nrf-frontend. Defaults to latest.'
        required: false
      nrf-backend:
        description: 'Docker image tag for nrf-backend (e.g. latest, 1.2.3). When set, spins up nrf-backend and its dependencies. Leave blank to skip nrf-backend.'
        required: false
      browser:
        description: 'Browser engine to use (chromium, firefox, webkit). Defaults to chromium.'
        required: false
        default: chromium
  workflow_call:
    inputs:
      nrf-frontend:
        required: false
        type: string
      nrf-backend:
        required: false
        type: string
      browser:
        required: false
        type: string
        default: chromium

jobs:
  build:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    steps:
      - uses: DEFRA/nrf-journey-tests/run-journey-tests@main
        with:
          nrf-frontend: ${{ inputs.nrf-frontend }}
          nrf-backend: ${{ inputs.nrf-backend }}
          browser: ${{ inputs.browser }}
