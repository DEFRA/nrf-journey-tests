server {
    listen 80;

    # Route file upload requests to the CDP Uploader.
    # After upload, cdp-uploader redirects to /quote/upload-received (relative).
    # Because everything is proxied on the same origin (port 3000), that redirect
    # resolves correctly to the nrf-frontend.
    location /upload-and-scan/ {
        proxy_pass http://cdp-uploader:7337;
        proxy_set_header Host $host;
    }

    # Route everything else to the nrf-frontend.
    location / {
        proxy_pass http://nrf-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
