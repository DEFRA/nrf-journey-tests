name: Run Journey Tests on GitHub
description: Runs the NRF end-to-end journey tests in either localstack or CDP cloud mode.

inputs:
  ref:
    required: false
    description: >
      Git ref to checkout nrf-journey-tests at.
      Defaults to the repository default branch (main) when omitted.
      Set automatically by journey-tests.yml to test the current branch.
  environment:
    required: false
    description: >
      CDP environment name (e.g. dev, test, prod).
      When set, skips Docker Compose and runs tests against the already-deployed
      service at https://nrf-frontend.<environment>.cdp-int.defra.cloud.
      When omitted, Docker Compose starts nrf-frontend locally (localstack mode).
  nrf-frontend:
    required: false
    description: >
      Docker image tag for nrf-frontend (localstack mode only).
      Defaults to latest when omitted.
  nrf-backend:
    required: false
    description: >
      Docker image tag for nrf-backend (localstack mode only).
      Defaults to latest when omitted.
  browser:
    required: false
    default: chromium
    description: >
      Browser engine to run tests against.
      Accepted values: chromium, firefox, webkit. Defaults to chromium.

runs:
  using: 'composite'
  steps:
    # Resolve depends-on BEFORE checking out nrf-journey-tests so that a
    # "Depends on: DEFRA/nrf-journey-tests#<N>" in the calling PR is honoured.
    # The action checks out dependent repos into subdirectories (e.g. ./nrf-journey-tests/).
    - name: Resolve Depends-On PRs
      if: ${{ !inputs.environment }}
      uses: depends-on/depends-on-action@0.15.0
      with:
        token: ${{ github.token }}

    # If depends-on checked out nrf-journey-tests, capture its commit SHA so we
    # can use it as the ref for the main checkout below.
    - name: Detect nrf-journey-tests depends-on checkout
      if: ${{ !inputs.environment }}
      id: detect-jt
      shell: bash
      run: |
        [ -d "./nrf-journey-tests" ] && echo "ref=$(git -C ./nrf-journey-tests rev-parse HEAD)" >> $GITHUB_OUTPUT || true

    # Check out the test code. clean: false preserves the subdirectories that
    # depends-on checked out (nrf-frontend, nrf-backend, nrf-impact-assessor).
    # Uses the depends-on SHA when present, otherwise falls back to inputs.ref (or main).
    - uses: actions/checkout@v4
      with:
        repository: DEFRA/nrf-journey-tests
        ref: ${{ steps.detect-jt.outputs.ref || inputs.ref }}
        clean: false

    # The depends-on nrf-journey-tests subdirectory is now redundant — the repo
    # has been checked out to the workspace root above.
    - name: Remove nrf-journey-tests depends-on subdirectory
      if: ${{ !inputs.environment && steps.detect-jt.outputs.ref != '' }}
      shell: bash
      run: rm -rf ./nrf-journey-tests

    - name: Detect depends-on checkouts
      if: ${{ !inputs.environment }}
      id: detect
      shell: bash
      run: |
        [ -d "./nrf-frontend" ]        && echo "nrf_frontend=true"        >> $GITHUB_OUTPUT || echo "nrf_frontend=false"        >> $GITHUB_OUTPUT
        [ -d "./nrf-backend" ]         && echo "nrf_backend=true"         >> $GITHUB_OUTPUT || echo "nrf_backend=false"         >> $GITHUB_OUTPUT
        [ -d "./nrf-impact-assessor" ] && echo "nrf_impact_assessor=true" >> $GITHUB_OUTPUT || echo "nrf_impact_assessor=false" >> $GITHUB_OUTPUT

    - name: Checkout nrf-backend (for Liquibase changelog and source build)
      if: ${{ !inputs.environment && steps.detect.outputs.nrf_backend == 'false' }}
      uses: actions/checkout@v4
      with:
        repository: DEFRA/nrf-backend
        path: nrf-backend

    - name: Checkout nrf-impact-assessor (for Alembic migrations)
      if: ${{ !inputs.environment && steps.detect.outputs.nrf_impact_assessor == 'false' }}
      uses: actions/checkout@v4
      with:
        repository: DEFRA/nrf-impact-assessor
        path: nrf-impact-assessor

    - name: Build nrf-frontend from depends-on checkout
      if: ${{ !inputs.environment && steps.detect.outputs.nrf_frontend == 'true' }}
      shell: bash
      run: docker build -t defradigital/nrf-frontend:pr-build ./nrf-frontend

    - name: Build nrf-backend from source
      if: ${{ !inputs.environment }}
      shell: bash
      run: docker build -t defradigital/nrf-backend:pr-build ./nrf-backend

    - name: Docker Login
      uses: DEFRA/cdp-build-action/docker-login@main

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Setup the tests
      run: npm ci
      shell: bash

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ inputs.browser || 'chromium' }}
      shell: bash

    - name: Start docker compose (localstack mode)
      if: ${{ !inputs.environment }}
      shell: bash
      run: |
        chmod +x docker/scripts/localstack/*.sh
        NRF_FRONTEND=${{ steps.detect.outputs.nrf_frontend == 'true' && 'pr-build' || inputs.nrf-frontend }} \
        NRF_BACKEND=pr-build \
        NRF_BACKEND_PATH=./nrf-backend \
        NRF_IMPACT_ASSESSOR_PATH=./nrf-impact-assessor \
        docker compose up --wait --wait-timeout 300 -d

    - name: Run the tests
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        BROWSER: ${{ inputs.browser || 'chromium' }}
      run: |
        npm run test:e2e; TEST_EXIT=$?
        npm run report
        exit $TEST_EXIT

    - name: Capture docker compose logs
      if: ${{ always() && !inputs.environment }}
      run: docker compose logs > logs.txt
      shell: bash

    - name: Show running containers
      if: always()
      run: docker ps
      shell: bash

    - name: Upload allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: ./allure-report

    - name: Upload docker compose logs
      if: ${{ always() && !inputs.environment }}
      uses: actions/upload-artifact@v4
      with:
        name: docker-compose-logs
        path: ./logs.txt
