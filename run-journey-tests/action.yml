name: Run Journey Tests on GitHub
description: Runs the NRF end-to-end journey tests in either localstack or CDP cloud mode.

inputs:
  ref:
    required: false
    description: >
      Git ref to checkout nrf-journey-tests at.
      Defaults to the repository default branch (main) when omitted.
      Set automatically by journey-tests.yml to test the current branch.
  environment:
    required: false
    description: >
      CDP environment name (e.g. dev, test, prod).
      When set, skips Docker Compose and runs tests against the already-deployed
      service at https://nrf-frontend.<environment>.cdp-int.defra.cloud.
      When omitted, Docker Compose starts nrf-frontend locally (localstack mode).
  nrf-frontend:
    required: false
    description: >
      Docker image tag for nrf-frontend (localstack mode only).
      Defaults to latest when omitted.
  nrf-backend:
    required: false
    description: >
      Docker image tag for nrf-backend (localstack mode only).
      Defaults to latest when omitted.
  browser:
    required: false
    default: chromium
    description: >
      Browser engine to run tests against.
      Accepted values: chromium, firefox, webkit. Defaults to chromium.

runs:
  using: 'composite'
  steps:
    # Resolve depends-on BEFORE checking out nrf-journey-tests so that a
    # "Depends on: DEFRA/nrf-journey-tests#<N>" in the calling PR is honoured.
    # The action checks out dependent repos into subdirectories (e.g. ./nrf-journey-tests/).
    - name: Resolve Depends-On PRs
      if: ${{ !inputs.environment }}
      uses: depends-on/depends-on-action@0.15.0
      with:
        token: ${{ github.token }}

    # If depends-on checked out nrf-journey-tests, capture the branch name so we
    # can use it as the ref for the main checkout below.
    #
    # depends-on-action may place the checkout either inside the workspace
    # (./nrf-journey-tests) or as a sibling directory (../nrf-journey-tests),
    # depending on whether it classifies the repo as a local package.json dependency.
    # We check both locations.
    #
    # We use the branch name rather than the commit SHA because depends-on creates
    # a local merge commit (PR branch + main) whose SHA does not exist on the remote
    # and cannot be fetched by actions/checkout.
    # depends-on names the local branch 'pr/<branch>' — strip the prefix to get
    # the actual remote branch name.
    #
    # We use symbolic-ref rather than rev-parse --abbrev-ref because depends-on
    # sometimes leaves the checkout in detached HEAD state (no branch). rev-parse
    # would return the literal string "HEAD" in that case, which is not a valid
    # remote branch and would cause actions/checkout to fail. symbolic-ref errors
    # out on detached HEAD instead, so we cleanly fall through to inputs.ref.
    - name: Detect nrf-journey-tests depends-on checkout
      if: ${{ !inputs.environment }}
      id: detect-jt
      shell: bash
      run: |
        echo "::group::Checking if depends-on checked out nrf-journey-tests"
        found=false
        for dir in "./nrf-journey-tests" "../nrf-journey-tests"; do
          if [ -d "$dir" ]; then
            found=true
            echo "depends-on created a checkout at $dir"
            if local_branch=$(git -C "$dir" symbolic-ref --short HEAD 2>/dev/null); then
              echo "It is on branch '${local_branch}', will checkout '${local_branch#pr/}'"
              echo "ref=${local_branch#pr/}" >> $GITHUB_OUTPUT
            else
              echo "It is in detached HEAD state (no branch), so ignoring it"
              echo "Will fall back to inputs.ref instead"
            fi
            break
          fi
        done
        if [ "$found" = false ]; then
          echo "No nrf-journey-tests checkout found, will use inputs.ref"
        fi
        echo "::endgroup::"

    # Check out the test code. clean: false preserves any subdirectories that
    # depends-on checked out inside the workspace (e.g. nrf-backend, nrf-frontend).
    # Uses the depends-on branch when present, otherwise falls back to inputs.ref (or main).
    - uses: actions/checkout@v4
      with:
        repository: DEFRA/nrf-journey-tests
        ref: ${{ steps.detect-jt.outputs.ref || inputs.ref }}
        clean: false

    # Clean up any depends-on nrf-journey-tests checkout — it is now redundant.
    - name: Remove nrf-journey-tests depends-on checkout
      if: ${{ !inputs.environment && steps.detect-jt.outputs.ref != '' }}
      shell: bash
      run: rm -rf ./nrf-journey-tests ../nrf-journey-tests

    # depends-on-action may place checkouts either inside the workspace (./repo)
    # or as sibling directories (../repo) depending on whether it classifies the
    # repo as a local package.json dependency. We check both locations and output
    # the actual path found so downstream steps use the correct location.
    - name: Detect depends-on checkouts
      if: ${{ !inputs.environment }}
      id: detect
      shell: bash
      run: |
        # Exclude $GITHUB_WORKSPACE itself from sibling detection — in the nrf-frontend
        # CI the workspace path is .../nrf-frontend/nrf-frontend, so ../nrf-frontend
        # resolves back to the workspace directory. Without this guard we would
        # incorrectly report a depends-on checkout that does not exist.
        ws=$(realpath "$GITHUB_WORKSPACE")
        echo "::group::Looking for repos that depends-on checked out"
        echo "Workspace is: $ws"
        echo "Working directory is: $(pwd)"
        echo ""
        echo "Directories in workspace:"
        ls -d ./*/ 2>/dev/null || echo "  (none)"
        echo ""
        echo "Sibling directories of workspace:"
        ls -d ../*/ 2>/dev/null || echo "  (none)"
        echo ""
        for dir in "./nrf-frontend" "../nrf-frontend"; do
          real=$(realpath "$dir" 2>/dev/null) || continue
          echo "Found $dir (resolves to $real)"
          if [ -d "$real" ] && [ "$real" != "$ws" ]; then
            echo "  -> Using as nrf-frontend depends-on checkout"
            echo "nrf_frontend_path=$dir" >> $GITHUB_OUTPUT; break
          else
            echo "  -> Skipping (same as workspace directory)"
          fi
        done
        for dir in "./nrf-backend" "../nrf-backend"; do
          real=$(realpath "$dir" 2>/dev/null) || continue
          echo "Found $dir (resolves to $real)"
          if [ -d "$real" ] && [ "$real" != "$ws" ]; then
            echo "  -> Using as nrf-backend depends-on checkout"
            echo "nrf_backend_path=$dir" >> $GITHUB_OUTPUT; break
          else
            echo "  -> Skipping (same as workspace directory)"
          fi
        done
        for dir in "./nrf-impact-assessor" "../nrf-impact-assessor"; do
          real=$(realpath "$dir" 2>/dev/null) || continue
          echo "Found $dir (resolves to $real)"
          if [ -d "$real" ] && [ "$real" != "$ws" ]; then
            echo "  -> Using as nrf-impact-assessor depends-on checkout"
            echo "nrf_impact_assessor_path=$dir" >> $GITHUB_OUTPUT; break
          else
            echo "  -> Skipping (same as workspace directory)"
          fi
        done
        echo "::endgroup::"

    - name: Checkout nrf-backend (for Liquibase changelog and source build)
      if: ${{ !inputs.environment && steps.detect.outputs.nrf_backend_path == '' }}
      uses: actions/checkout@v4
      with:
        repository: DEFRA/nrf-backend
        path: nrf-backend

    - name: Checkout nrf-impact-assessor (for Alembic migrations)
      if: ${{ !inputs.environment && steps.detect.outputs.nrf_impact_assessor_path == '' }}
      uses: actions/checkout@v4
      with:
        repository: DEFRA/nrf-impact-assessor
        path: nrf-impact-assessor

    - name: Build nrf-frontend from depends-on checkout
      if: ${{ !inputs.environment && steps.detect.outputs.nrf_frontend_path != '' }}
      shell: bash
      run: docker build -t defradigital/nrf-frontend:pr-build ${{ steps.detect.outputs.nrf_frontend_path }}

    - name: Build nrf-backend from source
      if: ${{ !inputs.environment }}
      shell: bash
      run: docker build -t defradigital/nrf-backend:pr-build ${{ steps.detect.outputs.nrf_backend_path || './nrf-backend' }}

    - name: Docker Login
      uses: DEFRA/cdp-build-action/docker-login@main

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Setup the tests
      run: npm ci
      shell: bash

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ inputs.browser || 'chromium' }}
      shell: bash

    - name: Start docker compose (localstack mode)
      if: ${{ !inputs.environment }}
      shell: bash
      run: |
        chmod +x docker/scripts/localstack/*.sh
        NRF_FRONTEND=${{ steps.detect.outputs.nrf_frontend_path != '' && 'pr-build' || inputs.nrf-frontend }} \
        NRF_BACKEND=pr-build \
        NRF_BACKEND_PATH=${{ steps.detect.outputs.nrf_backend_path || './nrf-backend' }} \
        NRF_IMPACT_ASSESSOR_PATH=${{ steps.detect.outputs.nrf_impact_assessor_path || './nrf-impact-assessor' }} \
        docker compose up --wait --wait-timeout 300 -d --no-build

    - name: Run the tests
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        BROWSER: ${{ inputs.browser || 'chromium' }}
      run: |
        npm run test:e2e; TEST_EXIT=$?
        npm run report
        exit $TEST_EXIT

    - name: Capture docker compose logs
      if: ${{ always() && !inputs.environment }}
      run: docker compose logs > logs.txt
      shell: bash

    - name: Show running containers
      if: always()
      run: docker ps
      shell: bash

    - name: Upload allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: ./allure-report

    - name: Upload docker compose logs
      if: ${{ always() && !inputs.environment }}
      uses: actions/upload-artifact@v4
      with:
        name: docker-compose-logs
        path: ./logs.txt
