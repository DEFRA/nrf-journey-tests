################################################################################
# Docker Compose file for starting up the service for testing in GitHub workflow
# This template provides comparable infrastructure to the real environment.
#   - mongodb
#   - redis
#   - localstack (s3, sqs, sns)
#
# Both mongo and localstack have init scripts included for setting up resources
# on startup. These scripts are in docker/scripts.
#
# Playwright manages its own Chromium browser — no separate browser container needed.
#
# The services being tested can either be started up here using the latest
# builds from dockerhub.
# In the example each service has a .env config file in docker/config/
# Services can reference each other by their container names.
# e.g. http://cdp-example-node-backend:3001/
#
################################################################################
services:
  ################################################################################
  mongodb:
    image: mongo:6
    volumes:
      - ./docker/scripts/mongodb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.hello().ok']
      interval: 5s
      start_period: 5s
      retries: 3
  ################################################################################
  localstack:
    image: localstack/localstack:3.2.0
    environment:
      - LOCALSTACK_HOST=127.0.0.1
      - SERVICES=s3,sqs,sns,dynamodb
      - LS_LOG=WARN
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3

  ################################################################################
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      start_period: 2s
      retries: 5

  ################################################################################
  #
  # Application services under test
  #
  ################################################################################
  nrf-frontend:
    image: defradigital/nrf-frontend:${NRF_FRONTEND:-latest}
    build:
      context: ../nrf-frontend
      target: development
    environment:
      - PORT=3000
      - NODE_ENV=development
      - ENABLE_DEFRA_ID=false
      - NRF_BACKEND_API_URL=http://nrf-backend:3001
      - NRF_BACKEND_OPTIONAL=true
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 5s
      start_period: 30s
      retries: 6

  ################################################################################
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: nrf_backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nrf_backend']
      interval: 10s
      start_period: 5s
      retries: 5

  ################################################################################
  liquibase:
    image: liquibase/liquibase:4.27-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${NRF_BACKEND_PATH:-../nrf-backend}/changelog:/liquibase/changelog
    command:
      - --url=jdbc:postgresql://postgres:5432/nrf_backend
      - --username=postgres
      - --password=password
      - --changelog-file=changelog/db.changelog.xml
      - update

  ################################################################################
  nrf-backend:
    image: defradigital/nrf-backend:${NRF_BACKEND:-latest}
    build:
      context: ${NRF_BACKEND_PATH:-../nrf-backend}
      target: development
    environment:
      - PORT=3001
      - NODE_ENV=development
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/nrf-backend.env
    ports:
      - '3001:3001'
    depends_on:
      localstack:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 5s
      start_period: 30s
      retries: 6
