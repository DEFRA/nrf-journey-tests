################################################################################
# Docker Compose file for starting up the service for testing in GitHub workflow
# This template provides comparable infrastructure to the real environment.
#   - mongodb
#   - redis
#   - localstack (s3, sqs, sns)
#
# Both mongo and localstack have init scripts included for setting up resources
# on startup. These scripts are in docker/scripts.
#
# Playwright manages its own Chromium browser — no separate browser container needed.
#
# The services being tested can either be started up here using the latest
# builds from dockerhub.
# In the example each service has a .env config file in docker/config/
# Services can reference each other by their container names.
# e.g. http://cdp-example-node-backend:3001/
#
################################################################################
services:

################################################################################
  mongodb:
    image: mongo:6
    volumes:
      - ./docker/scripts/mongodb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.hello().ok"]
      interval: 5s
      start_period: 5s
      retries: 3
################################################################################
  localstack:
    image: localstack/localstack:3.2.0
    environment:
      - LOCALSTACK_HOST=127.0.0.1
      - SERVICES=s3,sqs,sns,dynamodb
      - LS_LOG=WARN
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "localhost:4566"]
      interval: 5s
      start_period: 5s
      retries: 3

################################################################################
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "PING" ]
      interval: 5s
      start_period: 2s
      retries: 5


################################################################################
#
# Application services under test
#
# nrf-frontend is currently backed by nrf-prototypes (GOV.UK Prototype Kit).
# When the real nrf-frontend service is ready:
#   1. Update `image` to defradigital/nrf-frontend:${NRF_FRONTEND:-latest}
#   2. Update `build.context` to ../nrf-frontend
#   3. Add defra-id-stub service and DEFRA_ID_* / COOKIE_PASSWORD / REDIS_HOST env vars
#
################################################################################
  nrf-frontend:
    image: defradigital/nrf-prototypes:${NRF_PROTOTYPES:-latest}
    build:
      context: ../nrf-prototypes
      target: development
    environment:
      - PORT=3000
      - NODE_ENV=development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      start_period: 20s
      retries: 5

