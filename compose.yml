################################################################################
# Docker Compose file for the NRF full stack used in journey tests.
#
# Services:
#   - localstack (s3, sqs, sns, dynamodb)
#   - redis      (nrf-frontend sessions)
#   - postgres   (nrf-backend database)
#   - liquibase  (nrf-backend schema migrations)
#   - cdp-uploader (file upload service — mock virus scan enabled)
#   - nrf-backend
#   - nrf-frontend
#   - proxy (nginx — routes uploads to cdp-uploader, everything else to nrf-frontend)
#
# Localstack has an init script in docker/scripts/localstack.
# Playwright manages its own Chromium browser — no separate browser container needed.
# Services reference each other by container name, e.g. http://nrf-backend:3001/
#
# The nginx proxy sits in front of nrf-frontend and cdp-uploader on port 3000.
# This puts them on the same origin so the CDP Uploader's relative redirect
# (/quote/upload-received) resolves correctly back to the nrf-frontend.
#
################################################################################
services:
  ################################################################################
  localstack:
    image: localstack/localstack:3.2.0
    environment:
      - LOCALSTACK_HOST=127.0.0.1
      - SERVICES=s3,sqs,sns,dynamodb
      - LS_LOG=WARN
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ['CMD', 'curl', '-f', 'localhost:4566/_localstack/health']
      interval: 5s
      start_period: 5s
      retries: 3

  ################################################################################
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      start_period: 2s
      retries: 5

  ################################################################################
  cdp-uploader:
    image: defradigital/cdp-uploader:latest
    environment:
      - PORT=7337
      - MOCK_VIRUS_SCAN_ENABLED=true
      - MOCK_VIRUS_RESULT_DELAY=3
      - CONSUMER_BUCKETS=boundaries
    env_file:
      - ./docker/config/defaults.env
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7337/health']
      interval: 5s
      start_period: 10s
      retries: 6

  ################################################################################
  #
  # Application services under test
  #
  ################################################################################
  nrf-frontend:
    image: defradigital/nrf-frontend:${NRF_FRONTEND:-latest}
    build:
      context: ../nrf-frontend
      target: development
    # Override the default docker:dev entrypoint which requires Node >= 24.
    # The published image runs on Node 22 — run the watchers directly instead.
    command: npx cross-env USE_SWAGGER=true run-p frontend:watch server:watch
    environment:
      - PORT=3000
      - NODE_ENV=development
      - ENABLE_DEFRA_ID=false
      - NRF_BACKEND_API_URL=http://nrf-backend:3001
      - NRF_BACKEND_OPTIONAL=true
      - REDIS_HOST=redis
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      start_period: 30s
      retries: 6

  ################################################################################
  # Reverse proxy — exposes the service on port 3000 (host).
  # Routes /upload-and-scan/ to cdp-uploader and everything else to nrf-frontend.
  proxy:
    image: nginx:alpine
    ports:
      - '3000:80'
    volumes:
      - ./docker/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nrf-frontend:
        condition: service_healthy
      cdp-uploader:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/health']
      interval: 5s
      start_period: 5s
      retries: 6

  ################################################################################
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: nrf_backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nrf_backend']
      interval: 10s
      start_period: 5s
      retries: 5

  ################################################################################
  liquibase:
    image: liquibase/liquibase:4.27-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${NRF_BACKEND_PATH:-../nrf-backend}/changelog:/liquibase/changelog
    command:
      - --url=jdbc:postgresql://postgres:5432/nrf_backend
      - --username=postgres
      - --password=password
      - --changelog-file=changelog/db.changelog.xml
      - update

  ################################################################################
  nrf-backend:
    image: defradigital/nrf-backend:${NRF_BACKEND:-latest}
    build:
      context: ${NRF_BACKEND_PATH:-../nrf-backend}
      target: development
    environment:
      - PORT=3001
      - NODE_ENV=development
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/nrf-backend.env
    ports:
      - '3001:3001'
    depends_on:
      localstack:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      cdp-uploader:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 5s
      start_period: 30s
      retries: 6
